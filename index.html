<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrickBrockr</title>
    <meta name="description" content="Minimal dark profile page for BrickBrockr" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      #wrench {
        width: 2000px;
        bottom: 50px;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #040506;
        background-image: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/ec18fe47393655.5878dc40e26b6.gif');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, rgba(4,5,6,0.8), rgba(4,5,6,0.55));
        pointer-events: none;
        z-index: 0;
      }

      .glow {
        box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 70px rgba(255, 255, 255, 0.14);
      }

      .glitch {
        position: relative;
        display: inline-block;
        color: #000000;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-shadow: 0 0 10px rgba(255,255,255,0.18);
        filter: grayscale(1);
      }

      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        overflow: hidden;
        clip: rect(0, 9999px, 0, 0);
        opacity: 0.95;
        pointer-events: none;
        filter: grayscale(1);
      }

      .glitch::before {
        left: -2px;
        text-shadow: 1px 0 rgba(3, 3, 3, 0.55);
        animation: glitch-shift-left 3.2s infinite linear alternate-reverse;
      }

      .glitch::after {
        left: 2px;
        text-shadow: -1px 0 rgba(7, 7, 7, 0.45);
        animation: glitch-shift-right 4s infinite linear alternate-reverse;
      }

      @keyframes glitch-shift-left {
        0% { clip: rect(10px, 9999px, 16px, 0); }
        12% { clip: rect(28px, 9999px, 8px, 0); }
        24% { clip: rect(14px, 9999px, 24px, 0); }
        36% { clip: rect(40px, 9999px, 12px, 0); }
        48% { clip: rect(6px, 9999px, 36px, 0); }
        60% { clip: rect(34px, 9999px, 14px, 0); }
        72% { clip: rect(18px, 9999px, 20px, 0); }
        84% { clip: rect(44px, 9999px, 10px, 0); }
        100% { clip: rect(20px, 9999px, 28px, 0); }
      }§

      @keyframes glitch-shift-right {
        0% { clip: rect(22px, 9999px, 18px, 0); }
        12% { clip: rect(6px, 9999px, 32px, 0); }
        24% { clip: rect(30px, 9999px, 10px, 0); }
        36% { clip: rect(16px, 9999px, 26px, 0); }
        48% { clip: rect(42px, 9999px, 14px, 0); }
        60% { clip: rect(12px, 9999px, 20px, 0); }
        72% { clip: rect(36px, 9999px, 16px, 0); }
        84% { clip: rect(8px, 9999px, 28px, 0); }
        100% { clip: rect(24px, 9999px, 12px, 0); }
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-hidden bg-[#040506] text-zinc-100 antialiased">
    <main class="relative z-10 flex min-h-screen items-center justify-center px-5 py-10 sm:px-8">
      <div class="absolute inset-0 opacity-30 [background-image:linear-gradient(rgba(255,255,255,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.04)_1px,transparent_1px)] [background-size:42px_42px]"></div>

      <section class="relative z-10 w-full max-w-sm rounded-[28px] border border-white/10 bg-zinc-950/80 p-4 backdrop-blur-xl glow">
        <div class="overflow-hidden rounded-[24px] border border-white/10 bg-zinc-900">
          <img id="wrench"
            src="https://w0.peakpx.com/wallpaper/561/639/HD-wallpaper-wrench-watch-dogs-2-watcogs-2.jpg"
            alt="BrickBrockr"
            class="h-80 w-full object-cover sm:h-96"
          />
        </div>

        <div class="mt-6 text-center">
          <h1 class="glitch text-3xl font-semibold tracking-tight text-white sm:text-4xl" data-text="BrickBrockr">BrickBrockr</h1>
          <p class="mt-3 text-sm leading-7 text-zinc-400 sm:text-[15px]">
            I make websites, discord bots & servers and I like tinkering with Linux and other stuff. If you need any help, feel free to message me.
          </p>
        </div>
      </section>
    </main>

  </body>
</html>
